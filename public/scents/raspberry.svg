<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Raspberry made of drupelets -->
  <circle cx="40" cy="26" r="10" fill="rgba(255,45,120,0.2)" stroke="#ff2d78" stroke-width="1.2"/>
  <circle cx="25" cy="38" r="10" fill="rgba(255,45,120,0.2)" stroke="#ff2d78" stroke-width="1.2"/>
  <circle cx="55" cy="38" r="10" fill="rgba(255,45,120,0.2)" stroke="#ff2d78" stroke-width="1.2"/>
  <circle cx="32" cy="52" r="10" fill="rgba(255,45,120,0.2)" stroke="#ff2d78" stroke-width="1.2"/>
  <circle cx="48" cy="52" r="10" fill="rgba(255,45,120,0.2)" stroke="#ff2d78" stroke-width="1.2"/>
  <!-- Drupelet dots -->
  <circle cx="40" cy="26" r="2.5" fill="#ff2d78" opacity="0.7"/>
  <circle cx="25" cy="38" r="2.5" fill="#ff2d78" opacity="0.7"/>
  <circle cx="55" cy="38" r="2.5" fill="#ff2d78" opacity="0.7"/>
  <circle cx="32" cy="52" r="2.5" fill="#ff2d78" opacity="0.7"/>
  <circle cx="48" cy="52" r="2.5" fill="#ff2d78" opacity="0.7"/>
  <!-- Stem -->
  <line x1="40" y1="16" x2="40" y2="9" stroke="#ff2d78" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="40" y1="12" x2="34" y2="7" stroke="#ff2d78" stroke-width="1" stroke-linecap="round" opacity="0.5"/>
