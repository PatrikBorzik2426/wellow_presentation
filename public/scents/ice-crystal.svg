<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Snowflake / ice crystal -->
  <!-- Main axes -->
  <line x1="40" y1="8"  x2="40" y2="72" stroke="#00fff5" stroke-width="1.5" opacity="0.9"/>
  <line x1="8"  y1="40" x2="72" y2="40" stroke="#00fff5" stroke-width="1.5" opacity="0.9"/>
  <line x1="17" y1="17" x2="63" y2="63" stroke="#00fff5" stroke-width="1.5" opacity="0.9"/>
  <line x1="63" y1="17" x2="17" y2="63" stroke="#00fff5" stroke-width="1.5" opacity="0.9"/>
  <!-- Branch tips (top) -->
  <line x1="40" y1="18" x2="33" y2="12" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <line x1="40" y1="18" x2="47" y2="12" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <!-- Branch tips (right) -->
  <line x1="62" y1="40" x2="68" y2="33" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <line x1="62" y1="40" x2="68" y2="47" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <!-- Branch tips (bottom) -->
  <line x1="40" y1="62" x2="33" y2="68" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <line x1="40" y1="62" x2="47" y2="68" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <!-- Branch tips (left) -->
  <line x1="18" y1="40" x2="12" y2="33" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <line x1="18" y1="40" x2="12" y2="47" stroke="#00fff5" stroke-width="1" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="40" cy="40" r="3" fill="#00fff5" opacity="0.8"/>
</svg>
